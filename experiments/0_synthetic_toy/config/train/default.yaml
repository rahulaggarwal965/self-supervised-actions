max_steps: 5000
lr: 0.0003
eval_every: 500
log_every: 20
grad_clip: 1.0
# decoder-probe training steps for the latent->pixel counterfactual. 500 was too
# few for random-position runs (recon stays washed out ~5e-3 MSE); the probe must
# reconstruct the agent at arbitrary positions, which converges (~1e-5) by ~2.5k.
probe_steps: 3000
device: cuda
# two-stage: warm-start weights from a checkpoint and/or freeze the encoder
# (path is relative to the experiment dir). Defaults off.
init_from: null
freeze_encoder: false
