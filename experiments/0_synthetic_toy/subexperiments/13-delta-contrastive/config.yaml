# Resolved config for subexperiment 13-delta-contrastive (LABEL-FREE, NMI 0.785).
# Reproduce: uv run python train.py model=minimal_invariant_hires_proj model.num_codes=6 loss=ssl_cf data.counterfactuals=true +loss.terms.6.fn.delta=true loss.terms.6.fn.temperature=0.3 loss.terms.6.weight=15.0
model:
  dim: 256
  action_dim: 64
  num_codes: 6
  teacher_momentum: 0.99
  encoder:
    _target_: ssa.models.encoder.Encoder
    in_ch: 3
    dim: 256
  inverse:
    _target_: ssa.models.inverse.InvariantInverseModel
    feat_ch: 64
    feat_level: 2
    action_dim: 64
  quantizer:
    _target_: ssa.models.quantizer.VectorQuantizer
    num_codes: 6
    dim: 64
  dynamics:
    _target_: ssa.models.dynamics.Dynamics
    dim: 256
    action_dim: 64
  head:
    _target_: ssa.models.heads.LatentHead
  projection:
    _target_: ssa.models.projection.ProjectionHead
    dim: 256
    hidden: 256
    out_dim: 128
data:
  train_size: 8192
  eval_size: 1024
  seed: 0
  batch_size: 128
  num_workers: 4
  counterfactuals: true
  env:
    size: 64
    agent: 6
    step: 6
    n_distractors: 2
    history: 1
loss:
  terms:
  - name: prediction
    weight: 1.0
    fn:
      _target_: ssa.losses.prediction.PredictionLoss
  - name: vq
    weight: 1.0
    fn:
      _target_: ssa.losses.vq.VQLoss
      beta: 0.25
  - name: margin
    weight: 1.0
    fn:
      _target_: ssa.losses.margin.MarginLoss
      m: 0.002
  - name: usage
    weight: 0.1
    fn:
      _target_: ssa.losses.usage.UsageLoss
      sample_weight: 1.0
      batch_weight: 1.0
  - name: vicreg
    weight: 1.0
    fn:
      _target_: ssa.losses.vicreg.VICRegLoss
      var_weight: 25.0
      cov_weight: 1.0
      gamma: 1.0
  - name: decorrelation
    weight: 2.0
    fn:
      _target_: ssa.losses.decorrelation.DecorrelationLoss
  - name: cf_contrastive
    weight: 15.0
    fn:
      _target_: ssa.losses.counterfactual.CounterfactualContrastiveLoss
      temperature: 0.3
      delta: true
train:
  max_steps: 5000
  lr: 0.0003
  eval_every: 500
  log_every: 20
  grad_clip: 1.0
  probe_steps: 3000
  device: cuda
  init_from: null
  freeze_encoder: false
seed: 0
experiment: 0_synthetic_toy
wandb:
  project: ssa
  mode: online
